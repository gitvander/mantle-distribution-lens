name: Refresh published Lens data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: mantle-distribution-lens-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify JavaScript syntax
        run: |
          node --check app.js
          node --check server.js
          node --check scripts/refresh-published-data.js
      - name: Refresh public market evidence
        run: node scripts/refresh-published-data.js
      - name: Commit published data
        run: |
          if git diff --quiet -- data; then exit 0; fi
          git config user.name "mantle-distribution-lens-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git commit -m "chore(data): refresh published market evidence"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy refreshed site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
